name: Build & Verify Android Library

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install build tools
        run: sudo apt-get update -qq && sudo apt-get install -y -qq cmake ninja-build

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Setup Android NDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: sdkmanager --install "ndk;28.0.12674087"

      - name: Build native libraries
        working-directory: kotlin
        env:
          ANDROID_NDK_ROOT: ${{ env.ANDROID_HOME }}/ndk/28.0.12674087
        run: bash build_native.sh

      - name: Build library with Gradle
        working-directory: kotlin
        env:
          ANDROID_NDK_ROOT: ${{ env.ANDROID_HOME }}/ndk/28.0.12674087
        run: ./gradlew :audio-pipeline:assembleRelease

      - name: Publish to Maven Local (verify)
        working-directory: kotlin
        env:
          ANDROID_NDK_ROOT: ${{ env.ANDROID_HOME }}/ndk/28.0.12674087
        run: ./gradlew :audio-pipeline:publishToMavenLocal

      - name: Verify AAR artifact
        run: |
          AAR=$(find ~/.m2/repository -name "audio-pipeline-*.aar" | head -1)
          if [ -z "$AAR" ]; then
            echo "ERROR: AAR artifact not found in local Maven repository"
            exit 1
          fi
          echo "AAR artifact found: $AAR"
          ls -lh "$AAR"

      - name: Upload AAR artifact
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: audio-pipeline-aar
          path: ~/.m2/repository/org/difft/android/libraries/audio-pipeline/**/*.aar

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download AAR artifact
        uses: actions/download-artifact@v4
        with:
          name: audio-pipeline-aar
          path: artifacts

      - name: Detect snapshot
        id: meta
        run: |
          if [[ "${{ github.ref_name }}" == *-SNAPSHOT ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ steps.meta.outputs.prerelease == 'true' }}
          files: artifacts/**/*.aar
