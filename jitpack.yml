jdk:
  - openjdk17

before_install:
  - apt-get update -qq && apt-get install -y -qq autoconf automake libtool
  - sdk install java 22-open
  - sdk use java 22-open
  - |
    curl -fsSL https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -o /tmp/cmdtools.zip
    mkdir -p $ANDROID_HOME/cmdline-tools
    unzip -q -o /tmp/cmdtools.zip -d /tmp/cmdtools-extract
    rm -rf $ANDROID_HOME/cmdline-tools/latest
    mv /tmp/cmdtools-extract/cmdline-tools $ANDROID_HOME/cmdline-tools/latest
    rm -f /tmp/cmdtools.zip
  - yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
  - $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk;26.1.10909125"

env:
  JITPACK: "true"

install:
  - export ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/26.1.10909125
  - cd kotlin && ./gradlew :denoise-filter:publishToMavenLocal -xtest -xlint
