jdk:
  - openjdk17

before_install:
  - |
    echo "=== Installing CMake and Ninja ==="
    sudo apt-get update -qq && sudo apt-get install -y -qq cmake ninja-build
  - |
    echo "=== Installing Rust toolchain ==="
    curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
    export PATH="$HOME/.cargo/bin:$PATH"
    rustup target add aarch64-linux-android armv7-linux-androideabi i686-linux-android x86_64-linux-android
    cargo install cargo-ndk
  - yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
  - $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk;28.0.12674087"

env:
  JITPACK: "true"

install:
  - |
    export PATH="$HOME/.cargo/bin:$PATH"
    export ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/28.0.12674087
    echo "ANDROID_NDK_ROOT=$ANDROID_NDK_ROOT"
    cat "$ANDROID_NDK_ROOT/source.properties"
    cd kotlin && ./gradlew :audio-pipeline:publishToMavenLocal -xtest -xlint
