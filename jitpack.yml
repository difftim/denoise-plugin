jdk:
  - openjdk17

before_install:
  - sudo apt-get update -qq && sudo apt-get install -y -qq autoconf automake libtool
  - yes | sdkmanager --install "ndk;28.0.12674087" > /dev/null 2>&1 || true
  - export ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/28.0.12674087

install:
  - export ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/28.0.12674087
  - cd kotlin && ./gradlew :denoise-filter:publishToMavenLocal
